<!-- investor.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<nav class="navbar">
<h2>Grow Us</h2>
</nav>

<div class="container">
<h1>Investor Dashboard</h1>

<input type="text" id="search" placeholder="Search startups...">

<div class="grid" id="startupList">

<div class="card">
<h3>AI Tutor</h3>
<p>Smart AI learning assistant</p>
</div>

<div class="card">
<h3>Solar Grid</h3>
<p>Decentralized solar energy</p>
</div>

</div>

</div>

<script src="script.js"></script>
<script>
const search = document.getElementById("search")
search.addEventListener("input", ()=>{
let val = search.value.toLowerCase()
document.querySelectorAll("#startupList .card").forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none"
})
})
</script>
</body>
</html>
