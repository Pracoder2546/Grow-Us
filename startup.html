<!DOCTYPE html>
<html>
<head>
<title>Submit Pitch</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2 class="logo">🌱 Grow Us</h2>
</nav>
    <canvas id="particles"></canvas>
<h1 class="pageTitle">Submit Your Startup Pitch</h1>

<form class="pitchform">

<input type="text" placeholder="Startup Name" style=" padding: 18px;"> 

<textarea placeholder="Describe your idea" style=" padding: 24px;"></textarea>

<select>
<option>Choose Field</option>
<option>AI</option>
<option>Healthcare</option>
<option>Finance</option>
<option>Education</option>
</select>

<p>Contact Information</p>
<input type="text" placeholder="Contact Number" style="padding: 14px;">
<input type="text" placeholder="Email Address " style="padding: 14px;">

<input type="file">

<button class="submitbtn" style="margin-bottom: 50px; margin-top: 12px;">Submit Pitch</button>

</form>

<script src="script.js"></script>
</body>
</html>
